<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MenuMind AI - Smart Excel SaaS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* [Mantieni qui tutti i tuoi stili originali...] */
        body { font-family: -apple-system, sans-serif; background-color: #f1f5f9; padding: 20px; }
        .excel-table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        .excel-table th, .excel-table td { padding: 10px; border: 1px solid #e2e8f0; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-danger { background-color: #fee2e2; color: #991b1b; }
        .status-success { background-color: #dcfce7; color: #166534; }
        .btn { background-color: #107c41; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .btn-danger { background-color: #ef4444; }
    </style>
</head>
<body>

    <div id="risparmio-card" style="background: #107c41; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center;">
        <h2 style="margin: 0;">Risparmio totale generato</h2>
        <p id="totale-risparmio" style="font-size: 2em; font-weight: bold; margin: 10px 0 0 0;">€ 0.00</p>
    </div>

    <table class="excel-table">
        <thead>
            <tr>
                <th>Nome Piatto</th>
                <th>Prezzo (€)</th>
                <th>Costo Ieri (€)</th>
                <th>Costo Oggi (€)</th>
                <th>Stato Margine</th>
                <th>Azioni</th>
            </tr>
        </thead>
        <tbody id="excel-body"></tbody>
    </table>

    <script>
        const SUPABASE_URL = "https://jgpokqpgsrlmvspkxach.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpncG9rcXBnc3JsbXZzcGt4YWNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNTE0NTUsImV4cCI6MjA5NTcyNzQ1NX0.S6pcXGgIwkMxunG7ULLUQau56LNJg3pBrfXuD21xAws";   
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let piatti = []; // Dati caricati da Supabase

        // FUNZIONE RENDER PRINCIPALE (CON CALCOLO RISPARMIO INTEGRATO)
        function renderTabella() {
            let tbody = document.getElementById("excel-body");
            tbody.innerHTML = "";

            piatti.forEach((piatto) => {
                let isDemoId = String(piatto.id).startsWith("demo-");
                let statoHtml = piatto.costo_oggi > piatto.costo_ieri 
                    ? `<span class="status-badge status-danger">⚠️ ALLARME PREZZI</span>` 
                    : `<span class="status-badge status-success">✅ OTTIMALE</span>`;

                let tr = document.createElement("tr");
                tr.innerHTML = `
                    <td><input type="text" value="${piatto.nome}" onchange="aggiornaDato('${piatto.id}', 'nome', this.value)" ${isDemoId ? 'disabled' : ''}></td>
                    <td><input type="number" value="${piatto.vendita}" onchange="aggiornaDato('${piatto.id}', 'vendita', this.value)"></td>
                    <td><input type="number" value="${piatto.costo_ieri}" onchange="aggiornaDato('${piatto.id}', 'costo_ieri', this.value)"></td>
                    <td>
                        <span style="color: ${piatto.costo_oggi > piatto.costo_ieri ? '#ef4444' : '#107c41'}">
                            ${piatto.costo_oggi > piatto.costo_ieri ? '▲' : '▼'}
                        </span>
                        <input type="number" step="0.1" value="${piatto.costo_oggi}" onchange="aggiornaDato('${piatto.id}', 'costo_oggi', this.value)">
                    </td>
                    <td>${statoHtml}</td>
                    <td><button class="btn btn-danger" onclick="eliminaRiga('${piatto.id}')">Elimina</button></td>
                `;
                tbody.appendChild(tr);
            });

            // Calcolo del Risparmio (Somma delle differenze tra i costi)
            let risparmio = piatti.reduce((acc, p) => acc + (p.costo_ieri - p.costo_oggi), 0);
            let elementoRisparmio = document.getElementById("totale-risparmio");
            elementoRisparmio.innerText = "€ " + risparmio.toFixed(2);
            elementoRisparmio.style.color = risparmio < 0 ? "#f87171" : "white";
        }

        // FUNZIONI DI SUPPORTO
        async function aggiornaDato(id, campo, valore) {
            let piatto = piatti.find(p => String(p.id) === String(id));
            if (piatto) {
                piatto[campo] = campo === 'nome' ? valore : parseFloat(valore);
                await _supabase.from('piatti').update({ [campo]: piatto[campo] }).eq('id', id);
                renderTabella();
            }
        }

        async function eliminaRiga(id) {
            await _supabase.from('piatti').delete().eq('id', id);
            piatti = piatti.filter(p => String(p.id) !== String(id));
            renderTabella();
        }

        // Caricamento iniziale
        async function caricaDati() {
            let { data } = await _supabase.from('piatti').select('*');
            piatti = data || [];
            renderTabella();
        }

        caricaDati();
    </script>
</body>
</html>
